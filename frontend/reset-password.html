<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Choose a New Password - Let's-ParaConnect</title>
  <link rel="stylesheet" href="assets/styles/fonts.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      color: #1a2230;
      font-family: 'Sarabun', sans-serif;
      font-weight: 200;
    }

    main {
      max-width: 460px;
      margin: 8vh auto;
      padding: 2rem;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
    }

    p.lead {
      margin: 0 0 1.5rem;
      color: #475569;
      line-height: 1.55;
    }

    form {
      display: grid;
      gap: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .field-row {
      position: relative;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 0.85rem 4.75rem 0.85rem 0.9rem;
      border: 1px solid #cbd5e1;
      border-radius: 0.5rem;
      font: inherit;
      color: inherit;
      background: #ffffff;
    }

    .toggle-password {
      position: absolute;
      right: 0.75rem;
      top: 2.25rem;
      border: 0;
      background: transparent;
      color: #475569;
      font: inherit;
      cursor: pointer;
      text-transform: lowercase;
    }

    .toggle-password:focus-visible,
    input:focus-visible,
    button[type="submit"]:focus-visible,
    .back-link:focus-visible {
      outline: 2px solid #1a2230;
      outline-offset: 2px;
    }

    button[type="submit"] {
      border: 1px solid #1a2230;
      background: transparent;
      color: #1a2230;
      padding: 0.85rem 1rem;
      font: inherit;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    button[type="submit"][disabled] {
      opacity: 0.65;
      cursor: wait;
    }

    #message {
      min-height: 1.5rem;
      margin-top: 0.25rem;
      color: #475569;
      line-height: 1.5;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <main>
    <h1>Choose a new password</h1>
    <p class="lead">Enter your new password below. This reset link can only be used for the account tied to the email that requested it.</p>

    <form id="resetForm">
      <div class="field-row">
        <label for="newPassword">New password</label>
        <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" minlength="8" required />
        <button class="toggle-password" type="button" data-target="newPassword">show</button>
      </div>

      <div class="field-row">
        <label for="confirmPassword">Confirm new password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required />
        <button class="toggle-password" type="button" data-target="confirmPassword">show</button>
      </div>

      <button type="submit">Reset Password</button>
    </form>

    <div id="message" role="status" aria-live="polite"></div>
    <a class="back-link" href="login.html">Back to sign in</a>
  </main>

  <script src="assets/scripts/reset-password.js"></script>
</body>
</html>
