<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages | Let’s-ParaConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@200;400&family=Cormorant+Garamond:wght@300;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#fff;
      --accent:#b6a47a;
      --line:rgba(0,0,0,0.08);
      --muted:#8a8a8a;
      --ink:#1a1a1a;
      --panel:#fcfcfc;
      --font-serif:'Cormorant Garamond',serif;
      --font-sans:'Sarabun',sans-serif;
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    body {
      font-family:var(--font-sans);
      font-weight:200;
      background:var(--bg);
      color:var(--ink);
      display:flex;
      min-height:100vh;
      height:auto;
      overflow:hidden;
    }

    .sidebar {
      width:240px;
      background:#f5f5f5e6;
      display:flex;
      flex-direction:column;
      border-right:1px solid var(--line);
      padding:24px 16px;
    }
    .logo {
      font-family:var(--font-serif);
      font-size:1.6rem;
      text-align:center;
      margin-bottom:36px;
    }
    nav{display:flex;flex-direction:column;gap:14px;}
    nav a {
      text-decoration:none;
      color:var(--ink);
      font-weight:400;
      font-size:.95rem;
      padding:10px 14px;
      border-radius:8px;
      transition:background .3s ease;
    }
    nav a.active,nav a:hover{background:rgba(0,0,0,0.04);}
    .sidebar-footer{margin-top:auto;font-size:.7rem;color:var(--muted);text-align:center;}

    .main {
      flex:1;
      padding:40px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
    }

    header h1 {
      font-family:var(--font-serif);
      font-weight:300;
      font-size:2rem;
      margin-bottom:1rem;
    }

    header p {color:var(--muted);margin-bottom:1.5rem;}

    .messages-layout {
      display:grid;
      grid-template-columns:260px 300px 1fr;
      grid-template-areas:"cases threads chat";
      gap:1.5rem;
      min-height:460px;
      height:calc(100vh - 160px);
    }

    .cases-list,
    .threads-list {
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--panel);
      overflow-y:auto;
      padding:1rem;
    }

    .cases-list { grid-area:cases; }
    .threads-list { grid-area:threads; }
    .chat-panel { grid-area:chat; }

    .case-item {
      padding:.6rem .8rem;
      border-bottom:1px solid var(--line);
      cursor:pointer;
      transition:background .2s ease;
    }
    .case-item:last-child {border-bottom:none;}
    .case-item:hover{background:rgba(182,164,122,0.1);} 
    .case-item.active{background:rgba(182,164,122,0.15);font-weight:400;}

    .thread-item {
      border-bottom:1px solid var(--line);
      padding:.7rem .8rem;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:.75rem;
      transition:background .2s ease;
    }
    .thread-item:last-child {border-bottom:none;}
    .thread-item:hover{background:rgba(182,164,122,0.08);} 
    .thread-item.active{background:rgba(182,164,122,0.15);} 
    .thread-meta {font-size:.85rem;color:var(--muted);} 
    .reply-btn {
      border:1px solid var(--accent);
      background:var(--accent);
      color:#fff;
      border-radius:6px;
      padding:.3rem .75rem;
      font-size:.85rem;
      transition:all .2s ease;
      flex-shrink:0;
    }
    .reply-btn:hover{background:#a38e5f;}

    .chat-panel {
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--panel);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      min-height:400px;
    }
    .chat-header {
      padding:1rem;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:.75rem;
    }
    .chat-header h2 {
      font-family:var(--font-serif);
      font-weight:400;
      font-size:1.3rem;
    }
    .chat-body {
      flex:1;
      overflow-y:auto;
      padding:1rem;
      display:flex;
      flex-direction:column;
      gap:.6rem;
    }
    .chat-msg {
      padding:.6rem .9rem;
      border-radius:6px;
      font-size:.9rem;
      max-width:80%;
    }
    .chat-msg.them {background:#f2f2f2;color:var(--ink);align-self:flex-start;}
    .chat-msg.you {background:var(--accent);color:#fff;align-self:flex-end;}
    .chat-input {
      display:flex;
      border-top:1px solid var(--line);
      padding:.8rem;
      gap:.5rem;
    }
    .chat-input input {
      flex:1;
      border:1px solid var(--line);
      border-radius:6px;
      padding:.5rem .8rem;
      font-size:.9rem;
    }
    .chat-input button {
      background:var(--accent);
      color:#fff;
      border:none;
      border-radius:6px;
      padding:.5rem 1rem;
      cursor:pointer;
      font-size:.9rem;
      transition:background .2s ease;
    }
    .chat-input button:hover{background:#a38e5f;}

    .chat-actions { position:relative; }
    .chat-menu-trigger {
      background:none;
      border:none;
      color:var(--muted);
      font-size:1.2rem;
      cursor:pointer;
      padding:.25rem .45rem;
      border-radius:6px;
      transition:color .2s, background .2s;
    }
    .chat-menu-trigger:hover { color:var(--accent); background:rgba(0,0,0,0.04); }
    .chat-menu {
      position:absolute;
      top:120%;
      right:0;
      background:#fff;
      border:1px solid var(--line);
      border-radius:10px;
      min-width:180px;
      box-shadow:0 12px 28px rgba(0,0,0,0.14);
      display:none;
      z-index:20;
    }
    .chat-actions.open .chat-menu { display:block; }
    .chat-menu button {
      width:100%;
      border:none;
      background:none;
      text-align:left;
      padding:.65rem .9rem;
      font-size:.9rem;
      cursor:pointer;
      transition:background .2s,color .2s;
    }
    .chat-menu button:hover { background:rgba(182,164,122,0.12); color:var(--accent); }

    @media (max-width:1200px) {
      .messages-layout {
        grid-template-columns:220px 1fr;
        grid-template-areas:
          "cases chat"
          "threads chat";
        height:auto;
      }
    }

    @media (max-width:900px) {
      body { flex-direction:column; overflow:auto; }
      .sidebar {
        width:100%;
        flex-direction:column;
        align-items:center;
        gap:12px;
      }
      .sidebar nav {
        width:100%;
        flex-direction:row;
        flex-wrap:wrap;
        justify-content:center;
      }
      .sidebar nav a {
        flex:1 1 120px;
        text-align:center;
      }
      .main { padding:24px; }
      .messages-layout {
        grid-template-columns:1fr;
        grid-template-areas:
          "cases"
          "threads"
          "chat";
        height:auto;
      }
      .cases-list,
      .threads-list,
      .chat-panel {
        max-height:none;
      }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo">Dashboard</div>
    <nav>
      <a href="dashboard-attorney.html">Home</a>
      <a href="active-cases.html">Cases</a>
      <a href="messages.html" class="active">Messages</a>
      <a href="documents.html">Documents</a>
      <a href="review.html">Review</a>
      <a href="case-files.html">Case Files</a>
      <a href="payments-escrow.html">Billing</a>
      <a href="tasks.html">Tasks</a>
      <a href="help.html">Help</a>
    </nav>
    <div class="sidebar-footer">© Let’s-ParaConnect 2025</div>
  </aside>

  <main class="main">
    <header>
      <h1>Messages</h1>
      <p>View and respond to all case communications. Newest messages appear at the top.</p>
    </header>

    <div class="messages-layout">

      <div class="cases-list" id="casesList"></div>

      <div class="threads-list" id="threadsList"></div>

      <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
          <h2 id="chatTitle">Chat</h2>
          <div class="chat-actions" id="chatActions">
            <button class="chat-menu-trigger" aria-label="Conversation actions" aria-expanded="false">⋯</button>
            <div class="chat-menu" role="menu">
              <button data-chat-action="print">Print Conversation</button>
              <button data-chat-action="download">Download Conversation</button>
            </div>
          </div>
        </div>
        <div class="chat-body" id="chatBody"></div>
        <div class="chat-input">
          <input id="chatInput" type="text" placeholder="Type a message..." />
          <button id="sendBtn">Send</button>
        </div>
      </div>

    </div>
  </main>

  <script>
    const casesData = [
      {
        id:'case1',
        title:'Motion for Summary Judgment',
        threads:[
          {
            id:'thread1',
            title:'J. Stone',
            snippet:'Uploaded revised exhibits.',
            updated:'2h ago',
            messages:[
              {sender:'them', text:'Uploaded revised exhibits.'},
              {sender:'you', text:'Reviewing now, thank you.'},
              {sender:'them', text:'Perfect! Let me know if any edits are needed.'}
            ]
          },
          {
            id:'thread2',
            title:'T. Nguyen',
            snippet:'Draft motion ready for review.',
            updated:'5h ago',
            messages:[
              {sender:'them', text:'Draft motion ready for review.'},
              {sender:'you', text:'Received, reviewing later today.'}
            ]
          }
        ]
      },
      {
        id:'case2',
        title:'Anderson Merger Filing',
        threads:[
          {
            id:'thread3',
            title:'Client Services',
            snippet:'Escrow release briefing Friday.',
            updated:'Yesterday',
            messages:[
              {sender:'them', text:'Reminder: Escrow release briefing set for Friday at 10am PT.'},
              {sender:'you', text:'Confirmed. Will attend.'}
            ]
          }
        ]
      }
    ];

    const casesList = document.getElementById('casesList');
    const threadsList = document.getElementById('threadsList');
    const chatBody = document.getElementById('chatBody');
    const chatTitle = document.getElementById('chatTitle');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatActions = document.getElementById('chatActions');
    const chatMenuTrigger = chatActions.querySelector('.chat-menu-trigger');
    const chatMenu = chatActions.querySelector('.chat-menu');

    let activeCase = null;
    let activeThread = null;

    function renderCases(){
      casesList.innerHTML = '';
      casesData.forEach((c,idx)=>{
        const div=document.createElement('div');
        div.className='case-item'+(idx===0?' active':'');
        div.textContent = c.title;
        div.dataset.caseId = c.id;
        div.addEventListener('click',()=>selectCase(c.id));
        casesList.appendChild(div);
      });
    }

    function renderThreads(caseId){
      threadsList.innerHTML='';
      const currentCase = casesData.find(c=>c.id===caseId);
      if(!currentCase) return;
      currentCase.threads.forEach((t,idx)=>{
        const div=document.createElement('div');
        div.className='thread-item'+(idx===0?' active':'');
        div.dataset.threadId = t.id;
        div.innerHTML = `<div><strong>${t.title}</strong><div class="thread-meta">${t.snippet}</div></div><button class="reply-btn">Reply</button>`;
        div.addEventListener('click',()=>selectThread(caseId, t.id));
        threadsList.appendChild(div);
        const replyBtn = div.querySelector('.reply-btn');
        replyBtn.addEventListener('click',(e)=>{
          e.stopPropagation();
          chatInput.focus();
        });
      });
    }

    function renderChat(caseId, threadId){
      const currentCase = casesData.find(c=>c.id===caseId);
      if(!currentCase) return;
      const thread = currentCase.threads.find(t=>t.id===threadId);
      if(!thread) return;
      chatTitle.textContent = `${thread.title} · ${currentCase.title}`;
      chatBody.innerHTML='';
      thread.messages.slice().forEach(m=>{
        const div=document.createElement('div');
        div.className=`chat-msg ${m.sender}`;
        div.textContent = (m.sender==='you'? 'You: ':'') + m.text;
        chatBody.appendChild(div);
      });
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function selectCase(caseId){
      activeCase = caseId;
      activeThread = null;
      document.querySelectorAll('.case-item').forEach(el=>{
        el.classList.toggle('active', el.dataset.caseId===caseId);
      });
      renderThreads(caseId);
      const firstThread = casesData.find(c=>c.id===caseId)?.threads[0];
      if(firstThread){
        selectThread(caseId, firstThread.id);
      } else {
        chatBody.innerHTML = '<p style="color:var(--muted);">No threads yet.</p>';
        chatTitle.textContent = 'Chat';
      }
    }

    function selectThread(caseId, threadId){
      activeCase = caseId;
      activeThread = threadId;
      document.querySelectorAll('.thread-item').forEach(el=>{
        el.classList.toggle('active', el.dataset.threadId===threadId);
      });
      renderChat(caseId, threadId);
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', e=>{
      if(e.key==='Enter') sendMessage();
    });

    function sendMessage(){
      const text = chatInput.value.trim();
      if(!text || !activeCase || !activeThread) return;
      const currentCase = casesData.find(c=>c.id===activeCase);
      const thread = currentCase.threads.find(t=>t.id===activeThread);
      thread.messages.unshift({sender:'you', text});
      renderChat(activeCase, activeThread);
      const threadDiv = Array.from(document.querySelectorAll('.thread-item')).find(el=>el.dataset.threadId===activeThread);
      if(threadDiv){
        threadDiv.querySelector('.thread-meta').textContent = text;
      }
      chatInput.value='';
    }

    function closeChatMenu(){
      chatActions.classList.remove('open');
      chatMenuTrigger.setAttribute('aria-expanded','false');
    }

    chatMenuTrigger.addEventListener('click', e=>{
      e.stopPropagation();
      const open = chatActions.classList.contains('open');
      closeChatMenu();
      if(!open){
        chatActions.classList.add('open');
        chatMenuTrigger.setAttribute('aria-expanded','true');
      }
    });

    document.addEventListener('click', e=>{
      if(!chatActions.contains(e.target)) closeChatMenu();
    });
    document.addEventListener('keydown', e=>{
      if(e.key==='Escape') closeChatMenu();
    });
    chatMenu.addEventListener('click', e=>{
      const btn = e.target.closest('button[data-chat-action]');
      if(!btn) return;
      handleChatAction(btn.dataset.chatAction);
      closeChatMenu();
    });

    function handleChatAction(action){
      if(action==='print'){
        window.print();
        return;
      }
      if(action==='download'){
        if(!activeCase || !activeThread) return;
        const currentCase = casesData.find(c=>c.id===activeCase);
        const thread = currentCase?.threads.find(t=>t.id===activeThread);
        if(!currentCase || !thread) return;
        const content = thread.messages.map(m => `${m.sender === 'you' ? 'You' : thread.title}: ${m.text}`).join('\n');
        const blob = new Blob([content], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${currentCase.title.replace(/\s+/g,'_')}_${thread.title.replace(/\s+/g,'_')}.txt`;
        a.click();
      }
    }

    renderCases();
    if(casesData.length){
      selectCase(casesData[0].id);
    }
  </script>
</body>
</html>
